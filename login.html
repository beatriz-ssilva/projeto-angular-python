<h2>Login</h2>

<form (ngSubmit)="entrar()">

<label>Email</label>
<input type="email" [(ngModel)]="email" name="email">

<br><br>

<label>Senha</label>
<input type="password" [(ngModel)]="senha" name="senha">

<br><br>

<button type="submit">Entrar</button>

</form>

<br>

<h3 *ngIf="usuarioLogado">
Bem-vindo, {{ usuarioLogado }}!
</h3>

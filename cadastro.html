<h2>Cadastro</h2>

<form (ngSubmit)="salvar()">

<label>Nome</label>
<input type="text" [(ngModel)]="cliente.nome" name="nome">

<br><br>

<label>Email</label>
<input type="email" [(ngModel)]="cliente.email" name="email">

<br><br>

<label>Senha</label>
<input type="password" [(ngModel)]="cliente.senha" name="senha">

<br><br>

<button type="submit">Cadastrar</button>

</form>
